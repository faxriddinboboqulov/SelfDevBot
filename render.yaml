services:
  - type: web
    name: selfdev-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MODE
        value: webhook
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
